<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - Kelp Tutoring</title>
  <link rel="stylesheet" href="../../styles/style.css" />
  <script type="module" src="../../auth/signUp.js"></script>
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-header">
        <h1>Create account</h1>
        <p>Set up your Kelp profile to access schedules, practice, and tutoring workflows.</p>
      </div>

      <form id="signup-form" class="auth-form">
        <div class="input-group">
          <label for="fullName">Full name</label>
          <input id="fullName" type="text" placeholder="Your full name" required />
        </div>

        <div class="input-group">
          <label for="birthDate">Birth date</label>
          <input id="birthDate" type="date" required />
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="At least 6 characters" required />
        </div>

        <button type="submit" class="btn btn-secondary">Create account</button>
        <a href="login.html" class="btn-outline header-btn auth-inline-link">Back to login</a>
      </form>

      <p id="message" class="message"></p>
    </section>
  </main>
</body>
</html>
