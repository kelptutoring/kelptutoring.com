<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script type="module" src="../auth/login.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Kelp Tutoring</title>
  <link rel="stylesheet" href="../../styles/style.css" />
</head>

<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-header">
        <h1>Bem-vindo</h1>
        <p>Entre na sua conta ou crie um novo cadastro.</p>
      </div>

      <form id="login-form" class="auth-form">
        <div class="input-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="seuemail@exemplo.com" required />
        </div>

        <div class="input-group">
          <label for="password">Senha</label>
          <input id="password" type="password" placeholder="Digite sua senha" required />
        </div>

        <button type="submit" class="btn btn-primary">Entrar</button>
        <a href="../signUp/signUp.html" class="btn-secondary header-btn">Sign Up</a>
      </form>

      <div class="divider">
        <span>ou</span>
      </div>

      <button class="btn-google" type="button">
        Entrar com Google
      </button>

      <p id="message" class="message"></p>
    </section>
  </main>

</body>
</html>
