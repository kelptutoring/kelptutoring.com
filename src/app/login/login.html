<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Kelp Tutoring</title>
  <link rel="stylesheet" href="../../styles/style.css" />
  <script type="module" src="../../auth/login.js"></script>
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-header">
        <h1>Welcome back</h1>
        <p>Sign in to continue to your Kelp workspace.</p>
      </div>

      <form id="login-form" class="auth-form">
        <div class="input-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" required />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter your password" required />
        </div>

        <button type="submit" class="btn btn-primary">Login</button>
        <a href="signUp.html" class="btn-secondary header-btn auth-inline-link">Create account</a>
      </form>

      <div class="divider">
        <span>or</span>
      </div>

      <button id="google-login" class="btn-google" type="button">Continue with Google</button>

      <div class="auth-demo-links">
        <a href="../../../student-demo.html">Open student demo</a>
        <a href="../../../tutor-demo.html">Open tutor demo</a>
      </div>

      <p id="message" class="message"></p>
    </section>
  </main>
</body>
</html>
